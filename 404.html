<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="width=device-width,initial-scale=1,maximum-scale=1" name="viewport">
    <title>404</title>
    <style>html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%
    }

    html {
        box-sizing: border-box
    }

    *, *:before, *:after {
        box-sizing: inherit
    }

    h1 {
        color: #333;
        font-size: 2rem;
        margin: 1rem 0;
        line-height: 1
    }

    p {
        margin: 1rem 0;
        line-height: 1.3
    }

    main p {
        max-width: 26em;
        margin: 1rem auto
    }

    body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 16px;
        display: -ms-flexbox;
        display: flex;
        -ms-flex-align: center;
        align-items: center;
        -ms-flex-pack: justify;
        justify-content: space-between;
        -ms-flex-direction: column;
        flex-direction: column;
        padding: 1rem;
        color: rgba(0, 0, 0, 0.4);
        text-align: center;
        transition: background-color 1s linear
    }

    a {
        color: inherit;
        transition: all 0.1s ease-in
    }

    a:hover {
        color: rgba(0, 0, 0, 0.8)
    }

    .message-404 {
        position: relative;
        z-index: 1
    }

    .collage-404 {
        position: relative;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        perspective: 500px;
        display: inline-block;
        margin: 2vw 0
    }

    .collage-404 h1 {
        font-size: 30vw;
        margin: 0;
        line-height: 1;
        padding: 0;
        display: inline-block;
        transition: all 1s ease-in-out;
        opacity: 0.1
    }

    html.loaded .collage-404 h1 {
        opacity: 0
    }

    nav {
        display: -ms-flexbox;
        display: flex;
        align-self: stretch;
        -ms-flex-align: center;
        align-items: center;
        -ms-flex-pack: justify;
        justify-content: space-between;
        padding: 1rem
    }
    </style>
</head>
<body>
<nav>
      <span>
        <a href="/">Home</a>
      </span>
</nav>
<main>
    <section class="message-404">
        <h1>Whoops, that page is gone.</h1>
        <p>The site configured at this address does not contain the requested file.</p>
    </section>

    <section class="collage-404">
        <h1>404</h1>
    </section>
</main>
</body>
</html>
